name: CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  DOCKER_REGISTRY: my-registry.com

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --workspaces --if-present

      - name: Generate Prisma clients
        run: npm run prisma:generate --workspaces --if-present

      - name: Build microfrontends
        run: |
          npm run build -w apps/microfrontends/mfe-list
          npm run build -w apps/microfrontends/mfe-form

      - name: Preview microfrontends
        run: |
          npm run preview -w apps/microfrontends/mfe-list &
          npm run preview -w apps/microfrontends/mfe-form &
          sleep 10
          kill $(lsof -t -i :5001) 2>/dev/null || true
          kill $(lsof -t -i :5002) 2>/dev/null || true

      - name: Test
        run: npm run test --workspaces --if-present

  docker-build-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        app:
          - apps/microfrontends/backend
          - apps/management-client
          - apps/microfrontends/mfe-form
          - apps/microfrontends/mfe-list
          - apps/permissions/custom-permissions-service
          - apps/permissions/permissions-orchestrator-service
          - apps/permissions/external1-service
          - apps/permissions/external2-service
    steps:
      - uses: actions/checkout@v3

      - name: Log in to Docker Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract app name
        id: extract_name
        run: |
          APP_NAME=$(basename ${{ matrix.app }})
          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ env.DOCKER_REGISTRY }}/${{ env.APP_NAME }}:latest,${{ env.DOCKER_REGISTRY }}/${{ env.APP_NAME }}:${{ github.sha }}
