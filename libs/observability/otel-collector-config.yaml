receivers:
  otlp:
    protocols:
      grpc:
      http:

exporters:
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: default
    send_timestamps: true
  splunk_hec:
    token: "${SPLUNK_HEC_TOKEN}"
    endpoint: "https://${SPLUNK_HEC_URL}/services/collector"
    source: "otel"
    sourcetype: "_json"
  logging:
    loglevel: debug

processors:
  batch:

extensions:
  health_check:
  zpages:

service:
  extensions: [health_check, zpages]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [logging]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus, logging]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [splunk_hec, logging]
