name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-test-build:
    name: Lint, Test, and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npx nx run-many -t lint || true || true

      - name: Test
        run: npx nx run-many -t test || true

      - name: Build
        run: npx nx run-many -t build

  docker-build-push:
    name: Build and Push Docker Images
    needs: lint-test-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - { path: "backend", tag: "backend" }
          - { path: "management-client", tag: "management-client" }
          - { path: "microfrontends", tag: "microfrontends" }
          - { path: "examples/example-app", tag: "example-app" }
          - { path: "examples/example-app-angular", tag: "example-app-angular" }
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image for ${{ matrix.tag }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/${{ matrix.path }}/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_REGISTRY }}/${{ matrix.tag }}:${{ github.sha }},${{ secrets.DOCKER_REGISTRY }}/${{ matrix.tag }}:latest
