apiVersion: tyk.tyk.io/v1alpha1
kind: ApiDefinition
metadata:
  name: form-backend-api
  namespace: default
spec:
  name: "Form Backend API"
  use_keyless: false
  use_jwt: true
  jwt_source: "Authorization" # We expect oauth2-proxy or similar to inject a JWT via Authorization header
  jwt_policy_field_name: "pol"
  jwt_default_policies:
    - "form-backend-policy"
  protocol: http
  active: true
  proxy:
    target_url: "http://backend-service:3001"
    listen_path: "/form-backend"
    strip_listen_path: true
  version_data:
    not_versioned: true
    versions:
      Default:
        name: "Default"
  cors:
    enable: true
    allowed_origins:
      - "*"
    allowed_methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS"
    allowed_headers:
      - "Authorization"
      - "Content-Type"
      - "Accept"
  use_go_plugin_auth: false
