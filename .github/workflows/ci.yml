name: CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  DOCKER_REGISTRY: my-registry.com

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Calculate base and head SHAs
        id: calc_shas
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "BASE_SHA=${{ github.event.pull_request.base.sha }}" >> $GITHUB_ENV
            echo "HEAD_SHA=${{ github.event.pull_request.head.sha }}" >> $GITHUB_ENV
          else
            echo "BASE_SHA=${{ github.event.before }}" >> $GITHUB_ENV
            echo "HEAD_SHA=${{ github.sha }}" >> $GITHUB_ENV
          fi

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx nx affected -t lint --base=$BASE_SHA --head=$HEAD_SHA

      - name: Prepare Backend Tests
        run: DATABASE_URL=postgresql://foo:bar@localhost:5432/db npx nx affected -t prisma:generate --base=$BASE_SHA --head=$HEAD_SHA

      - name: Test
        run: npx nx affected -t test --base=$BASE_SHA --head=$HEAD_SHA

  setup-matrix:
    runs-on: ubuntu-latest
    needs: build-and-test
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Calculate base and head SHAs
        id: calc_shas
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "BASE_SHA=${{ github.event.pull_request.base.sha }}" >> $GITHUB_ENV
            echo "HEAD_SHA=${{ github.event.pull_request.head.sha }}" >> $GITHUB_ENV
          else
            echo "BASE_SHA=${{ github.event.before }}" >> $GITHUB_ENV
            echo "HEAD_SHA=${{ github.sha }}" >> $GITHUB_ENV
          fi
      - name: Install dependencies
        run: npm ci
      - id: set-matrix
        run: |
          AFFECTED=$(npx nx show projects --affected --with-target=docker:build --json --base=$BASE_SHA --head=$HEAD_SHA)
          if [ -z "$AFFECTED" ] || [ "$AFFECTED" == "[]" ]; then
            echo "matrix={\"app\":[]}" >> $GITHUB_OUTPUT
          else
            echo "matrix={\"app\":$AFFECTED}" >> $GITHUB_OUTPUT
          fi

  docker-build-push:
    needs: setup-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main' && needs.setup-matrix.outputs.matrix != '{"app":[]}'
    strategy:
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract app name and path
        id: extract_name
        run: |
          PROJECT_ROOT=$(npx nx show project ${{ matrix.app }} --json | node -e "console.log(JSON.parse(require('fs').readFileSync(0, 'utf-8')).root)")
          echo "APP_NAME=${{ matrix.app }}" >> $GITHUB_ENV
          echo "APP_PATH=$PROJECT_ROOT" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ env.APP_PATH }}/Dockerfile
          push: true
          tags: ${{ env.DOCKER_REGISTRY }}/${{ env.APP_NAME }}:latest,${{ env.DOCKER_REGISTRY }}/${{ env.APP_NAME }}:${{ github.sha }}
